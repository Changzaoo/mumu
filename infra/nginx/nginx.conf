# ──────────────────────────────────────────────────────────────
# Aurial — production reverse proxy (nginx:alpine).
# Mounted at /etc/nginx/nginx.conf by infra/docker/docker-compose.prod.yml.
#
# Upstream: the `api` service (Express, port 4000, socket.io on /ws).
# The SPA itself lives on Vercel — this server only fronts the API.
# ──────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time cache=$upstream_cache_status';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Compression ──────────────────────────────────────────
    # Brotli needs the ngx_brotli module (not in stock nginx:alpine).
    # If you switch to an image that ships it (e.g. nginx with the brotli
    # dynamic module), uncomment:
    #   brotli on;
    #   brotli_comp_level 5;
    #   brotli_types application/json application/javascript text/css
    #                text/plain application/vnd.apple.mpegurl image/svg+xml;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        application/vnd.apple.mpegurl
        image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────
    # Edge limit in front of the API's own Redis-backed limits
    # (ARCHITECTURE.md §3: 300 req/min/IP global). 20 r/s + burst 40.
    limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=20r/s;
    limit_req_status 429;

    # ── HLS media cache ───────────────────────────────────────
    # /var/cache/nginx/media is the named docker volume `media-cache`.
    proxy_cache_path /var/cache/nginx/media
                     levels=1:2
                     keys_zone=media_cache:64m
                     max_size=5g
                     inactive=7d
                     use_temp_path=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream aurial_api {
        # Docker DNS can be unavailable on some hosts; route through the
        # published API port on the host gateway for deterministic startup.
        server host.docker.internal:4000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Multipart audio uploads (API caps per-file sizes itself).
        client_max_body_size 512m;

        # ── Security headers ──────────────────────────────────
        # nginx does NOT inherit add_header into locations that declare
        # their own add_header — they are re-declared in the HLS locations
        # below on purpose. Keep both places in sync.
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Health check (compose healthcheck + uptime monitors) ──
        location = /healthz {
            access_log off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://aurial_api;
        }

        # ── HLS manifests (/api/v1/stream/:trackId/manifest.m3u8) ──
        # Regex locations win over the /api/ prefix below, so streaming
        # bypasses the general rate limit. Manifests carry signed tokens
        # and playback position — keep them fresh (tiny TTL, no-cache
        # towards clients so seeks/quality switches stay accurate).
        location ~* \.m3u8$ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://aurial_api;

            proxy_cache media_cache;
            # Strip the signed-token query string from the cache key so one
            # user's warm cache serves everyone. Trade-off: cached responses
            # skip upstream token validation. Acceptable on a LAN deploy;
            # for public exposure prefer auth_request or the
            # X-Accel-Redirect flow documented at the bottom of this file.
            proxy_cache_key $uri;
            proxy_cache_valid 200 2s;
            proxy_cache_lock on;

            add_header Cache-Control "no-cache" always;
            add_header X-Cache-Status $upstream_cache_status always;
            # re-declared (see security headers note above)
            add_header X-Frame-Options DENY always;
            add_header X-Content-Type-Options nosniff always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }

        # ── HLS segments (.ts/.m4s) — content-addressed, never change ──
        location ~* \.(ts|m4s)$ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://aurial_api;

            proxy_cache media_cache;
            proxy_cache_key $uri; # see token note in the .m3u8 block
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;

            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Cache-Status $upstream_cache_status always;
            # re-declared (see security headers note above)
            add_header X-Frame-Options DENY always;
            add_header X-Content-Type-Options nosniff always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }

        # ── socket.io (listen-together, notifications, activity feed) ──
        location /ws {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://aurial_api;

            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── REST API (/api/v1/*, /api/docs) ───────────────────
        location /api/ {
            limit_req zone=api_ratelimit burst=40 nodelay;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://aurial_api;

            # Stream multipart uploads straight through to the API instead
            # of buffering 500 MB files on disk first.
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ──────────────────────────────────────────────────────
        # X-Accel-Redirect (signed-stream flow, optional upgrade)
        # ──────────────────────────────────────────────────────
        # Today the API streams HLS bytes itself (GET /api/v1/stream/...),
        # and nginx just caches them above. A more efficient pattern once
        # media lives on the server's disk (STORAGE_DRIVER=local):
        #
        #   1. Client requests /api/v1/stream/:trackId/... with its signed
        #      token as usual.
        #   2. The API validates the HMAC token, then instead of piping the
        #      file it responds with an empty body plus the header:
        #         X-Accel-Redirect: /protected-media/audio/<trackId>/<file>
        #   3. nginx intercepts that header and serves the file directly
        #      from disk (sendfile, zero Node.js involvement), while the
        #      location stays `internal` — clients can never fetch
        #      /protected-media/* without going through API auth first.
        #
        # To enable: mount the media dir into this container and uncomment.
        #
        # location /protected-media/ {
        #     internal;
        #     alias /srv/aurial/media/;   # mount point of the media volume
        #     add_header Cache-Control "public, max-age=31536000, immutable" always;
        # }

        # Everything else (the SPA lives on Vercel, not here).
        location / {
            return 404;
        }
    }

    # ──────────────────────────────────────────────────────────
    # TLS — uncomment when exposing publicly (see docs/DEPLOY.md).
    # Obtain certs with certbot on the host, then copy/symlink them into
    # infra/nginx/certs/ (mounted read-only at /etc/nginx/certs):
    #
    #   sudo certbot certonly --standalone -d api.yourdomain.com
    #   sudo cp /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem /opt/aurial/infra/nginx/certs/
    #   sudo cp /etc/letsencrypt/live/api.yourdomain.com/privkey.pem  /opt/aurial/infra/nginx/certs/
    #
    # Then duplicate every `location` block from the :80 server here (or
    # extract them into an include file) and make :80 redirect:
    #
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name api.yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #
    #     client_max_body_size 512m;
    #
    #     # ... same locations as the :80 server above ...
    # }
    #
    # server {
    #     listen 80;
    #     server_name api.yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}
