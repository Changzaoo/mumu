# Aurial — system nginx site (drop into /etc/nginx/sites-available/aurial).
# Serves the built web SPA and reverse-proxies the API container on :4000.
# The dockerized nginx (infra/nginx/nginx.conf) is NOT used on this host.

upstream aurial_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Built SPA (vite dist) synced here by the deploy.
    root /mnt/cartaosd/web;
    index index.html;

    client_max_body_size 512m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API
    location /api/ {
        proxy_pass http://aurial_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location = /healthz {
        proxy_pass http://aurial_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # WebSocket (socket.io path /ws) — optional self-host backend
    location /ws {
        proxy_pass http://aurial_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # P2P signaling server (WebRTC matchmaking, node on :4100)
    location /rtc {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Hashed assets — immutable, long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PWA service worker must not be cached
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
