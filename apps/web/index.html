<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1 + user-scalable=no: sem zoom por pinça/foco em lugar
         nenhum (o iOS ainda ignora para pinça por acessibilidade — o zoom de
         foco em input morre pelo piso de 16px nos campos, no globals.css). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0A0C" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FCFCFC" />
    <meta name="description" content="radinho.online — sua rádio de música online" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="radinho.online" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" href="/icons/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>radinho.online</title>
    <script>
      // Apply theme before first paint — no flash. Mirrors settingsStore persistence.
      (function () {
        try {
          var raw = localStorage.getItem('aurial:settings');
          var theme = raw ? (JSON.parse(raw).state || {}).theme : 'dark';
          var dark =
            theme === 'light'
              ? false
              : theme === 'system'
                ? window.matchMedia('(prefers-color-scheme: dark)').matches
                : true;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
