<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0A0C" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FCFCFC" />
    <meta name="description" content="Aurial — streaming de música minimalista e profissional" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Aurial</title>
    <script>
      // Apply theme before first paint — no flash. Mirrors settingsStore persistence.
      (function () {
        try {
          var raw = localStorage.getItem('aurial:settings');
          var theme = raw ? (JSON.parse(raw).state || {}).theme : 'dark';
          var dark =
            theme === 'light'
              ? false
              : theme === 'system'
                ? window.matchMedia('(prefers-color-scheme: dark)').matches
                : true;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
